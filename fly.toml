# fly.toml — Fantasy Basketball Automation SaaS
app = "roto-fantasy-solver"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  FBA_UI_MODE = "react"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[mounts]
  source = "fba_data"
  destination = "/app/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/auth/status"
    timeout = "5s"
